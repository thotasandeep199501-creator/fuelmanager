<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deliveries - FuelManager</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="logo-icon"><i class="ti ti-gas-station"></i></div><div><div class="logo-name">FuelManager</div><div class="logo-sub">Main Street Station</div></div></div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-link"><i class="ti ti-layout-dashboard"></i><span>Dashboard</span></a>
      <a href="sales.html" class="nav-link"><i class="ti ti-chart-bar"></i><span>Live Sales</span></a>
      <a href="inventory.html" class="nav-link"><i class="ti ti-box"></i><span>Inventory</span></a>
      <a href="prices.html" class="nav-link"><i class="ti ti-tag"></i><span>Prices</span></a>
      <a href="delivery.html" class="nav-link active"><i class="ti ti-truck-delivery"></i><span>Deliveries</span></a>
      <a href="timesheet.html" class="nav-link"><i class="ti ti-clock"></i><span>Timesheet</span></a>
      <a href="reports.html" class="nav-link"><i class="ti ti-file-text"></i><span>Reports</span></a>
      <a href="downloads.html" class="nav-link"><i class="ti ti-download"></i><span>Downloads</span></a>
      <a href="suggestions.html" class="nav-link"><i class="ti ti-bulb"></i><span>Suggestions</span></a>
    </nav>
    <div class="sidebar-footer"><a href="#" class="nav-link"><i class="ti ti-settings"></i><span>Settings</span></a></div>
  </aside>
  <main class="main-content">
    <div class="topbar">
      <div><h1 class="topbar-title">Deliveries</h1><div class="topbar-sub">Record vendor deliveries and update inventory</div></div>
      <div class="topbar-actions">
        <button class="btn btn-outline" id="tab-new-btn" onclick="showTab('new')"><i class="ti ti-plus"></i> New delivery</button>
        <button class="btn btn-outline" id="tab-hist-btn" onclick="showTab('hist')"><i class="ti ti-history"></i> History</button>
      </div>
    </div>

    <div id="panel-new">
      <div class="card" style="margin-bottom:14px">
        <div class="card-title" style="margin-bottom:14px">Delivery details</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
          <div>
            <label style="font-size:12px;color:var(--text-2);display:block;margin-bottom:4px">Vendor name</label>
            <input id="d-vendor" type="text" placeholder="e.g. McLane Company" style="width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px">
          </div>
          <div>
            <label style="font-size:12px;color:var(--text-2);display:block;margin-bottom:4px">Invoice number</label>
            <input id="d-invoice" type="text" placeholder="Optional" style="width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px">
          </div>
          <div>
            <label style="font-size:12px;color:var(--text-2);display:block;margin-bottom:4px">Delivery date</label>
            <input id="d-date" type="date" style="width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px">
          </div>
        </div>
        <div style="margin-top:12px">
          <label style="font-size:12px;color:var(--text-2);display:block;margin-bottom:4px">Notes</label>
          <textarea id="d-notes" placeholder="Optional notes about this delivery" style="width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;min-height:50px"></textarea>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">Line items</span>
          <button class="btn btn-sm btn-primary" onclick="addLine()"><i class="ti ti-plus"></i> Add item</button>
        </div>
        <table id="lines-table">
          <thead><tr><th>Item name</th><th>Category</th><th>UPC</th><th>Qty received</th><th>Invoice price</th><th></th></tr></thead>
          <tbody id="lines-tbody"></tbody>
        </table>
        <div id="d-error" style="display:none;color:var(--red);font-size:13px;margin-top:10px"></div>
        <div style="margin-top:16px;display:flex;gap:10px">
          <button class="btn btn-primary" id="d-submit-btn" onclick="submitDelivery()"><i class="ti ti-check"></i> Submit &amp; update inventory</button>
        </div>
      </div>
    </div>

    <div id="panel-hist" style="display:none">
      <div id="hist-loading" style="text-align:center;padding:2rem;color:var(--text-2)"><i class="ti ti-loader" style="animation:spin 1s linear infinite;font-size:22px"></i></div>
      <div id="hist-list"></div>
    </div>
  </main>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
<script type="module">
import { getInventory, updateInventoryQty, addInventoryItem, saveDelivery, saveDeliveryItems, getDeliveries, today } from './js/db.js'

let lineCount = 0

function addLine() {
  lineCount++
  const id = 'line-' + lineCount
  const row = document.createElement('tr')
  row.id = id
  row.innerHTML = `
    <td><input type="text" class="ln-name" placeholder="Item name" style="width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px"></td>
    <td><select class="ln-cat" style="width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px">
      <option value="fuel">Fuel</option><option value="auto">Auto</option><option value="beverages" selected>Beverages</option>
      <option value="snacks">Snacks</option><option value="tobacco">Tobacco</option><option value="lottery">Lottery</option>
    </select></td>
    <td><input type="text" class="ln-upc" placeholder="Optional" style="width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px"></td>
    <td><input type="number" step="0.01" class="ln-qty" placeholder="0" style="width:90px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px"></td>
    <td><input type="number" step="0.01" class="ln-price" placeholder="0.00" style="width:90px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px"></td>
    <td><button class="btn btn-sm" onclick="document.getElementById('${id}').remove()"><i class="ti ti-trash"></i></button></td>
  `
  document.getElementById('lines-tbody').appendChild(row)
}
window.addLine = addLine

window.showTab = (tab) => {
  document.getElementById('panel-new').style.display = tab === 'new' ? 'block' : 'none'
  document.getElementById('panel-hist').style.display = tab === 'hist' ? 'block' : 'none'
  document.getElementById('tab-new-btn').classList.toggle('btn-primary', tab === 'new')
  document.getElementById('tab-hist-btn').classList.toggle('btn-primary', tab === 'hist')
  if (tab === 'hist') loadHistory()
}

window.submitDelivery = async () => {
  const errEl = document.getElementById('d-error')
  errEl.style.display = 'none'
  const vendor_name = document.getElementById('d-vendor').value.trim()
  const invoice_number = document.getElementById('d-invoice').value.trim()
  const delivery_date = document.getElementById('d-date').value || today()
  const notes = document.getElementById('d-notes').value.trim()

  const rows = Array.from(document.querySelectorAll('#lines-tbody tr'))
  const lines = rows.map(r => ({
    item_name: r.querySelector('.ln-name').value.trim(),
    category: r.querySelector('.ln-cat').value,
    upc: r.querySelector('.ln-upc').value.trim() || null,
    qty_received: parseFloat(r.querySelector('.ln-qty').value),
    invoice_price: parseFloat(r.querySelector('.ln-price').value)
  })).filter(l => l.item_name)

  if (!vendor_name) { errEl.textContent = 'Vendor name is required.'; errEl.style.display = 'block'; return }
  if (!lines.length) { errEl.textContent = 'Add at least one line item.'; errEl.style.display = 'block'; return }
  if (lines.some(l => isNaN(l.qty_received) || isNaN(l.invoice_price))) {
    errEl.textContent = 'Every line item needs a quantity and price.'; errEl.style.display = 'block'; return
  }

  const btn = document.getElementById('d-submit-btn')
  btn.disabled = true
  btn.textContent = 'Submitting...'

  try {
    const { data: inv } = await getInventory()
    const invByName = {}
    ;(inv || []).forEach(i => { invByName[i.item_name.toLowerCase()] = i })

    const { data: delivery, error: delErr } = await saveDelivery({
      vendor_name, invoice_number: invoice_number || null, delivery_date,
      total_items: lines.length, status: 'submitted', notes: notes || null
    })
    if (delErr) throw delErr

    const itemsPayload = lines.map(l => {
      const match = invByName[l.item_name.toLowerCase()]
      return {
        delivery_id: delivery.id,
        inventory_id: match ? match.id : null,
        upc: l.upc,
        item_name: l.item_name,
        category: l.category,
        qty_received: l.qty_received,
        invoice_price: l.invoice_price,
        prev_price: null,
        price_changed: false,
        is_new_item: !match,
        is_flagged: false,
        verified: true
      }
    })
    const { error: itemsErr } = await saveDeliveryItems(itemsPayload)
    if (itemsErr) throw itemsErr

    for (const l of lines) {
      const match = invByName[l.item_name.toLowerCase()]
      if (match) {
        await updateInventoryQty(match.id, parseFloat(match.current_qty || 0) + l.qty_received)
      } else {
        await addInventoryItem({
          item_name: l.item_name, category: l.category,
          current_qty: l.qty_received, unit: 'units', reorder_level: Math.max(1, Math.round(l.qty_received / 3))
        })
      }
    }

    document.getElementById('d-vendor').value = ''
    document.getElementById('d-invoice').value = ''
    document.getElementById('d-notes').value = ''
    document.getElementById('lines-tbody').innerHTML = ''
    addLine()
    showTab('hist')
  } catch (e) {
    errEl.textContent = 'Error: ' + (e.message || 'Could not save delivery.')
    errEl.style.display = 'block'
  } finally {
    btn.disabled = false
    btn.textContent = 'Submit & update inventory'
  }
}

async function loadHistory() {
  document.getElementById('hist-loading').style.display = 'block'
  document.getElementById('hist-list').innerHTML = ''
  const { data, error } = await getDeliveries()
  document.getElementById('hist-loading').style.display = 'none'
  if (error) { document.getElementById('hist-list').innerHTML = '<div class="card">Error loading deliveries: ' + error.message + '</div>'; return }
  if (!data || !data.length) { document.getElementById('hist-list').innerHTML = '<div class="card" style="text-align:center;color:var(--text-2)">No deliveries recorded yet.</div>'; return }

  document.getElementById('hist-list').innerHTML = data.map(d => `
    <div class="card" style="margin-bottom:12px">
      <div class="card-header">
        <div>
          <span class="card-title">${d.vendor_name}</span>
          <span style="font-size:12px;color:var(--text-2);margin-left:8px">${d.delivery_date}${d.invoice_number ? ' - ' + d.invoice_number : ''}</span>
        </div>
        <span class="badge b-live">${d.status}</span>
      </div>
      ${d.notes ? `<div style="font-size:13px;color:var(--text-2);margin-bottom:8px">${d.notes}</div>` : ''}
      <table>
        <thead><tr><th>Item</th><th>Category</th><th>Qty</th><th>Price</th><th>Flags</th></tr></thead>
        <tbody>
          ${(d.delivery_items || []).map(it => `
            <tr>
              <td>${it.item_name}</td>
              <td style="text-transform:capitalize">${it.category || ''}</td>
              <td>${it.qty_received}</td>
              <td>$${parseFloat(it.invoice_price || 0).toFixed(2)}</td>
              <td>${it.is_new_item ? '<span class="badge b-store">New</span>' : ''}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
  `).join('')
}

document.getElementById('d-date').value = today()
addLine()
</script>
</body>
</html>
