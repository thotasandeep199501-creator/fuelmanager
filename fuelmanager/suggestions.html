<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Suggestions — FuelManager</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-content">
    <div class="page-header">
      <div><div class="page-title">✨ AI Suggestions</div><div class="page-subtitle">Smart restocking and pricing recommendations</div></div>
      <div id="user-badge-header"></div>
    </div>
    <div class="page-body">

      <div class="alert alert-gas mb-6">✨ AI analyzes your sales patterns and inventory to give you actionable suggestions for Main Street Station.</div>

      <div class="card mb-6">
        <div class="card-title">Ask the AI</div>
        <div class="form-group">
          <textarea class="form-input" id="ai-question" rows="3" placeholder="e.g. What should I restock this week? Which fuel type is most profitable? What are my slowest selling items?"></textarea>
        </div>
        <button class="btn btn-primary btn-lg" id="ask-btn">Get Suggestions</button>
      </div>

      <div id="suggestions-area"></div>

      <!-- Quick suggestion buttons -->
      <div class="card">
        <div class="card-title">Quick Analysis</div>
        <div style="display:flex;flex-wrap:wrap;gap:10px">
          <button class="btn btn-secondary quick-btn" data-q="What inventory items should I restock this week based on typical gas station sales?">📦 Restock Suggestions</button>
          <button class="btn btn-secondary quick-btn" data-q="What are typical profit margin tips for a gas station convenience store in Wisconsin?">💰 Pricing Tips</button>
          <button class="btn btn-secondary quick-btn" data-q="What are the best-selling convenience store items at gas stations and how should I stock them?">🛒 Top Sellers Advice</button>
          <button class="btn btn-secondary quick-btn" data-q="How should I think about lottery ticket inventory and which ticket types are most popular at gas stations?">🎟 Lottery Strategy</button>
          <button class="btn btn-secondary quick-btn" data-q="What staffing tips do you have for a small gas station in a midwestern town like Waukesha, Wisconsin?">👥 Staffing Tips</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script type="module">
  import { requireAuth, renderUserBadge } from './js/auth.js'
  import { renderSidebar } from './js/sidebar.js'

  const user = requireAuth()
  if (!user) throw new Error()
  document.getElementById('sidebar').innerHTML = renderSidebar('suggestions')
  renderUserBadge('user-badge-header')

  async function askAI(question) {
    const area = document.getElementById('suggestions-area')
    area.innerHTML = `<div class="card mb-4"><div class="loading-state"><div class="spinner"></div><p>Thinking...</p></div></div>`
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: `You are a helpful assistant for Main Street Station, a gas station in Waukesha, Wisconsin. 
            The station sells gas (regular, plus, premium, diesel), lottery tickets (scratch tickets, Powerball, Mega Millions), 
            and convenience store items (beverages, snacks, coffee, tobacco, auto items).
            
            Give practical, specific, actionable advice. Format your response with clear sections and bullet points.
            
            Question: ${question}`
          }]
        })
      })
      const data = await res.json()
      const text = data.content?.[0]?.text || 'No response received.'
      // Convert markdown-like formatting to HTML
      const html = text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/^### (.*)/gm, '<h4 style="font-size:14px;font-weight:600;margin:14px 0 6px;color:var(--gas)">$1</h4>')
        .replace(/^## (.*)/gm, '<h3 style="font-size:16px;font-weight:700;margin:16px 0 8px">$1</h3>')
        .replace(/^- (.*)/gm, '<li style="margin:4px 0 4px 16px">$1</li>')
        .replace(/\n\n/g, '</p><p style="margin:8px 0">')
        .replace(/\n/g, '<br>')
      area.innerHTML = `<div class="card mb-4">
        <div class="card-title">✨ AI Response</div>
        <div style="font-size:14px;line-height:1.7;color:var(--text)">${html}</div>
      </div>`
    } catch(e) {
      area.innerHTML = `<div class="card mb-4"><div class="alert alert-amber">Could not connect to AI. Check your internet connection and try again.</div></div>`
    }
  }

  document.getElementById('ask-btn').addEventListener('click', ()=>{
    const q = document.getElementById('ai-question').value.trim()
    if (!q) return
    askAI(q)
  })

  document.querySelectorAll('.quick-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.getElementById('ai-question').value = btn.dataset.q
      askAI(btn.dataset.q)
    })
  })
</script>
</body>
</html>
