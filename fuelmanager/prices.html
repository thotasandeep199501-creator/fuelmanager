<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fuel Prices — FuelManager</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-content">
    <div class="page-header">
      <div><div class="page-title">Fuel Prices</div><div class="page-subtitle">Update prices and view history</div></div>
      <div id="user-badge-header"></div>
    </div>
    <div class="page-body">

      <div class="grid-2 mb-6">
        <!-- Current Prices -->
        <div class="card">
          <div class="card-title">Current Prices</div>
          <div id="current-prices"><div class="loading-state"><div class="spinner"></div></div></div>
        </div>

        <!-- Update Price Form -->
        <div class="card">
          <div class="card-title">Update a Price</div>
          <div class="form-group">
            <label class="form-label">Fuel Type</label>
            <select class="form-select" id="fuel-type">
              <option value="regular">Regular</option>
              <option value="plus">Plus</option>
              <option value="premium">Premium</option>
              <option value="diesel">Diesel</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">New Price per Gallon</label>
            <input type="number" class="form-input" id="new-price" placeholder="3.299" step="0.001" min="0">
          </div>
          <div class="form-group">
            <label class="form-label">Notes (optional)</label>
            <input type="text" class="form-input" id="price-notes" placeholder="e.g. Supplier price increase">
          </div>
          <button class="btn btn-gas btn-lg" style="width:100%" id="update-btn">Update Price</button>
        </div>
      </div>

      <!-- Price History -->
      <div class="card">
        <div class="card-title">Price Change History</div>
        <div id="history-list"><div class="loading-state"><div class="spinner"></div></div></div>
      </div>

    </div>
  </div>
</div>

<script type="module">
  import { requireManager, renderUserBadge } from './js/auth.js'
  import { getCurrentPrices, updateFuelPrice, getPriceHistory, fmt$, fmtDate, fmtTime } from './js/db.js'
  import { toast } from './js/app.js'
  import { renderSidebar } from './js/sidebar.js'

  const user = requireManager()
  if (!user) throw new Error()
  document.getElementById('sidebar').innerHTML = renderSidebar('prices')
  renderUserBadge('user-badge-header')

  const fuelColors = { regular:'gas', plus:'amber', premium:'lottery', diesel:'store' }

  async function loadPrices() {
    const { data, error } = await getCurrentPrices()
    const el = document.getElementById('current-prices')
    if (error||!data) { el.innerHTML='<div class="error-state"><p>Could not load prices.</p></div>'; return }
    const fuels = ['regular','plus','premium','diesel']
    el.innerHTML = fuels.map(f=>{
      const r = data[f]
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)">
        <div>
          <span class="badge badge-${fuelColors[f]||'gray'}" style="margin-right:8px">${f}</span>
          <span style="font-size:11px;color:var(--text-3)">${r?fmtDate(r.effective_from):''}</span>
        </div>
        <div style="font-size:22px;font-weight:700;color:var(--gas)">${r?'$'+parseFloat(r.price_per_gallon).toFixed(3):'Not set'}</div>
      </div>`
    }).join('')
  }

  async function loadHistory() {
    const { data, error } = await getPriceHistory()
    const el = document.getElementById('history-list')
    if (error) { el.innerHTML='<div class="error-state"><p>Could not load history.</p></div>'; return }
    if (!data.length) { el.innerHTML='<div class="empty-state"><p>No price history yet.</p></div>'; return }
    el.innerHTML = `<div class="table-wrap"><table>
      <thead><tr><th>Date</th><th>Time</th><th>Fuel Type</th><th>Price</th><th>Set By</th><th>Notes</th></tr></thead>
      <tbody>${data.map(r=>`<tr>
        <td style="font-size:12px;color:var(--text-2)">${fmtDate(r.effective_from)}</td>
        <td style="font-size:12px;color:var(--text-2)">${fmtTime(r.effective_from)}</td>
        <td><span class="badge badge-${fuelColors[r.fuel_type]||'gray'}">${r.fuel_type}</span></td>
        <td style="font-weight:700">$${parseFloat(r.price_per_gallon).toFixed(3)}</td>
        <td style="font-size:12px">${r.employees?.name||'—'}</td>
        <td style="font-size:12px;color:var(--text-2)">${r.notes||'—'}</td>
      </tr>`).join('')}</tbody>
    </table></div>`
  }

  document.getElementById('update-btn').addEventListener('click', async ()=>{
    const price = parseFloat(document.getElementById('new-price').value)
    if (!price||price<=0) { toast('Enter a valid price.','error'); return }
    const btn = document.getElementById('update-btn')
    btn.disabled=true; btn.textContent='Saving...'
    const { error } = await updateFuelPrice(
      document.getElementById('fuel-type').value,
      price, user.id,
      document.getElementById('price-notes').value.trim()
    )
    if (error) toast('Error: '+error.message,'error')
    else { toast('Price updated!','success'); document.getElementById('new-price').value=''; document.getElementById('price-notes').value=''; loadPrices(); loadHistory() }
    btn.disabled=false; btn.textContent='Update Price'
  })

  loadPrices()
  loadHistory()
</script>
</body>
</html>
