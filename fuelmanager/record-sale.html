<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Record Sale — FuelManager</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-content">
    <div class="page-header">
      <div>
        <div class="page-title">Record Sale</div>
        <div class="page-subtitle">Log a gas, lottery, or store transaction</div>
      </div>
      <div id="user-badge-header"></div>
    </div>
    <div class="page-body">

      <div class="tabs" id="sale-tabs">
        <button class="tab-btn active" data-tab="gas">⛽ Gas</button>
        <button class="tab-btn" data-tab="lottery">🎟 Lottery</button>
        <button class="tab-btn" data-tab="store">🛒 Store</button>
      </div>

      <!-- GAS SALE -->
      <div data-panel="gas">
        <div class="card" style="max-width:500px">
          <div class="card-title">Gas Sale</div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Pump Number</label>
              <select class="form-select" id="gas-pump">
                <option value="1">Pump 1</option><option value="2">Pump 2</option>
                <option value="3">Pump 3</option><option value="4">Pump 4</option>
                <option value="5">Pump 5</option><option value="6">Pump 6</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Fuel Type</label>
              <select class="form-select" id="gas-type">
                <option value="regular">Regular</option>
                <option value="plus">Plus</option>
                <option value="premium">Premium</option>
                <option value="diesel">Diesel</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Gallons</label>
              <input type="number" class="form-input" id="gas-gallons" placeholder="0.000" step="0.001" min="0">
            </div>
            <div class="form-group">
              <label class="form-label">Price per Gallon</label>
              <input type="number" class="form-input" id="gas-price" placeholder="3.299" step="0.001" min="0">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Payment Method</label>
            <select class="form-select" id="gas-payment">
              <option value="cash">Cash</option>
              <option value="credit">Credit Card</option>
              <option value="debit">Debit Card</option>
              <option value="fleet">Fleet Card</option>
            </select>
          </div>
          <div id="gas-total-display" style="background:var(--gas-light);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:16px;display:none">
            <div style="font-size:12px;color:var(--gas);font-weight:600">TOTAL</div>
            <div style="font-size:28px;font-weight:700;color:var(--gas)" id="gas-total-amt">$0.00</div>
          </div>
          <button class="btn btn-gas btn-lg" style="width:100%" id="gas-submit">Save Gas Sale</button>
        </div>
      </div>

      <!-- LOTTERY SALE -->
      <div data-panel="lottery" style="display:none">
        <div class="card" style="max-width:500px">
          <div class="card-title">Lottery Sale</div>
          <div class="form-group">
            <label class="form-label">Ticket Type</label>
            <select class="form-select" id="lot-type">
              <option value="Scratch $1">Scratch — $1</option>
              <option value="Scratch $2">Scratch — $2</option>
              <option value="Scratch $5">Scratch — $5</option>
              <option value="Scratch $10">Scratch — $10</option>
              <option value="Scratch $20">Scratch — $20</option>
              <option value="Scratch $30">Scratch — $30</option>
              <option value="Powerball">Powerball</option>
              <option value="Mega Millions">Mega Millions</option>
              <option value="Pick 3">Pick 3</option>
              <option value="Pick 4">Pick 4</option>
              <option value="Badger 5">Badger 5</option>
            </select>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Price per Ticket</label>
              <input type="number" class="form-input" id="lot-price" placeholder="2.00" step="0.01" min="0">
            </div>
            <div class="form-group">
              <label class="form-label">Quantity</label>
              <input type="number" class="form-input" id="lot-qty" placeholder="1" min="1" value="1">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Payment Method</label>
            <select class="form-select" id="lot-payment">
              <option value="cash">Cash</option>
              <option value="credit">Credit Card</option>
              <option value="debit">Debit Card</option>
            </select>
          </div>
          <div id="lot-total-display" style="background:var(--lottery-light);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:16px;display:none">
            <div style="font-size:12px;color:var(--lottery);font-weight:600">TOTAL</div>
            <div style="font-size:28px;font-weight:700;color:var(--lottery)" id="lot-total-amt">$0.00</div>
          </div>
          <button class="btn btn-lottery btn-lg" style="width:100%" id="lot-submit">Save Lottery Sale</button>
        </div>
      </div>

      <!-- STORE SALE -->
      <div data-panel="store" style="display:none">
        <div class="card" style="max-width:500px">
          <div class="card-title">Store Sale</div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Category</label>
              <select class="form-select" id="store-cat">
                <option value="beverages">Beverages</option>
                <option value="snacks">Snacks</option>
                <option value="coffee">Coffee</option>
                <option value="tobacco">Tobacco</option>
                <option value="auto">Auto Items</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Item Name</label>
              <input type="text" class="form-input" id="store-name" placeholder="e.g. Monster Energy 16oz">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Quantity</label>
              <input type="number" class="form-input" id="store-qty" placeholder="1" min="1" value="1">
            </div>
            <div class="form-group">
              <label class="form-label">Unit Price</label>
              <input type="number" class="form-input" id="store-price" placeholder="2.99" step="0.01" min="0">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">UPC (optional)</label>
            <input type="text" class="form-input" id="store-upc" placeholder="Scan or type barcode">
          </div>
          <div class="form-group">
            <label class="form-label">Payment Method</label>
            <select class="form-select" id="store-payment">
              <option value="cash">Cash</option>
              <option value="credit">Credit Card</option>
              <option value="debit">Debit Card</option>
              <option value="ebt">EBT</option>
            </select>
          </div>
          <div id="store-total-display" style="background:var(--store-light);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:16px;display:none">
            <div style="font-size:12px;color:var(--store);font-weight:600">TOTAL</div>
            <div style="font-size:28px;font-weight:700;color:var(--store)" id="store-total-amt">$0.00</div>
          </div>
          <button class="btn btn-store btn-lg" style="width:100%" id="store-submit">Save Store Sale</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script type="module">
  import { requireAuth, renderUserBadge } from './js/auth.js'
  import { saveGasSale, saveLotterySale, saveStoreSale, fmt$ } from './js/db.js'
  import { toast, initTabs } from './js/app.js'
  import { renderSidebar } from './js/sidebar.js'

  const user = requireAuth()
  if (!user) throw new Error('Not logged in')
  document.getElementById('sidebar').innerHTML = renderSidebar('record-sale')
  renderUserBadge('user-badge-header')
  initTabs('sale-tabs')

  // Auto-calculate gas total
  const calcGas = () => {
    const g = parseFloat(document.getElementById('gas-gallons').value)||0
    const p = parseFloat(document.getElementById('gas-price').value)||0
    const total = g * p
    const disp = document.getElementById('gas-total-display')
    if (total > 0) { disp.style.display='block'; document.getElementById('gas-total-amt').textContent = fmt$(total) }
    else disp.style.display='none'
  }
  document.getElementById('gas-gallons').addEventListener('input', calcGas)
  document.getElementById('gas-price').addEventListener('input', calcGas)

  // Auto-calculate lottery total
  const calcLot = () => {
    const p = parseFloat(document.getElementById('lot-price').value)||0
    const q = parseInt(document.getElementById('lot-qty').value)||0
    const total = p * q
    const disp = document.getElementById('lot-total-display')
    if (total > 0) { disp.style.display='block'; document.getElementById('lot-total-amt').textContent = fmt$(total) }
    else disp.style.display='none'
  }
  document.getElementById('lot-price').addEventListener('input', calcLot)
  document.getElementById('lot-qty').addEventListener('input', calcLot)

  // Auto-calculate store total
  const calcStore = () => {
    const p = parseFloat(document.getElementById('store-price').value)||0
    const q = parseInt(document.getElementById('store-qty').value)||0
    const total = p * q
    const disp = document.getElementById('store-total-display')
    if (total > 0) { disp.style.display='block'; document.getElementById('store-total-amt').textContent = fmt$(total) }
    else disp.style.display='none'
  }
  document.getElementById('store-price').addEventListener('input', calcStore)
  document.getElementById('store-qty').addEventListener('input', calcStore)

  // SAVE GAS
  document.getElementById('gas-submit').addEventListener('click', async () => {
    const gallons = parseFloat(document.getElementById('gas-gallons').value)
    const price_per_gallon = parseFloat(document.getElementById('gas-price').value)
    if (!gallons || !price_per_gallon) { toast('Enter gallons and price.','error'); return }
    const btn = document.getElementById('gas-submit')
    btn.disabled=true; btn.textContent='Saving...'
    const { error } = await saveGasSale({
      pump_number: parseInt(document.getElementById('gas-pump').value),
      fuel_type: document.getElementById('gas-type').value,
      gallons, price_per_gallon,
      payment_method: document.getElementById('gas-payment').value,
      employee_id: user.id
    })
    if (error) { toast('Error saving: '+error.message,'error') }
    else { toast('Gas sale saved!','success'); document.getElementById('gas-gallons').value=''; document.getElementById('gas-price').value=''; document.getElementById('gas-total-display').style.display='none' }
    btn.disabled=false; btn.textContent='Save Gas Sale'
  })

  // SAVE LOTTERY
  document.getElementById('lot-submit').addEventListener('click', async () => {
    const ticket_price = parseFloat(document.getElementById('lot-price').value)
    const quantity = parseInt(document.getElementById('lot-qty').value)||1
    if (!ticket_price) { toast('Enter ticket price.','error'); return }
    const btn = document.getElementById('lot-submit')
    btn.disabled=true; btn.textContent='Saving...'
    const { error } = await saveLotterySale({
      ticket_type: document.getElementById('lot-type').value,
      ticket_price, quantity,
      payment_method: document.getElementById('lot-payment').value,
      employee_id: user.id
    })
    if (error) { toast('Error: '+error.message,'error') }
    else { toast('Lottery sale saved!','success'); document.getElementById('lot-price').value=''; document.getElementById('lot-qty').value='1'; document.getElementById('lot-total-display').style.display='none' }
    btn.disabled=false; btn.textContent='Save Lottery Sale'
  })

  // SAVE STORE
  document.getElementById('store-submit').addEventListener('click', async () => {
    const item_name = document.getElementById('store-name').value.trim()
    const unit_price = parseFloat(document.getElementById('store-price').value)
    const quantity = parseInt(document.getElementById('store-qty').value)||1
    if (!item_name || !unit_price) { toast('Enter item name and price.','error'); return }
    const btn = document.getElementById('store-submit')
    btn.disabled=true; btn.textContent='Saving...'
    const { error } = await saveStoreSale({
      category: document.getElementById('store-cat').value,
      item_name, quantity, unit_price,
      upc: document.getElementById('store-upc').value.trim()||null,
      payment_method: document.getElementById('store-payment').value,
      employee_id: user.id
    })
    if (error) { toast('Error: '+error.message,'error') }
    else { toast('Store sale saved!','success'); document.getElementById('store-name').value=''; document.getElementById('store-price').value=''; document.getElementById('store-qty').value='1'; document.getElementById('store-upc').value=''; document.getElementById('store-total-display').style.display='none' }
    btn.disabled=false; btn.textContent='Save Store Sale'
  })
</script>
</body>
</html>
