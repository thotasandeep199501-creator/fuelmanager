<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timesheet — FuelManager</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-content">
    <div class="page-header">
      <div><div class="page-title">Timesheet</div><div class="page-subtitle">Clock in and clock out</div></div>
      <div style="font-size:18px;font-weight:700;color:var(--text-2)" id="live-clock"></div>
    </div>
    <div class="page-body">

      <div class="grid-2 mb-6">
        <!-- Clock In/Out -->
        <div class="card">
          <div class="card-title">Clock In / Out</div>
          <div class="form-group">
            <label class="form-label">Select Employee</label>
            <select class="form-select" id="emp-select"><option value="">— Select employee —</option></select>
          </div>
          <div style="display:flex;gap:10px">
            <button class="btn btn-store btn-lg" style="flex:1" id="clock-in-btn">🟢 Clock In</button>
            <button class="btn btn-danger btn-lg" style="flex:1" id="clock-out-btn">🔴 Clock Out</button>
          </div>
          <div id="clock-msg" style="margin-top:12px;font-size:13px;text-align:center;color:var(--text-2)"></div>
        </div>

        <!-- Currently On Shift -->
        <div class="card">
          <div class="card-title">Currently On Shift</div>
          <div id="shift-list"><div class="loading-state"><div class="spinner"></div></div></div>
        </div>
      </div>

      <!-- Today's Time Entries -->
      <div class="card">
        <div class="card-title">Today's Time Entries</div>
        <div id="entries-list"><div class="loading-state"><div class="spinner"></div></div></div>
      </div>

    </div>
  </div>
</div>

<script type="module">
  import { requireAuth, renderUserBadge } from './js/auth.js'
  import { getEmployees, getCurrentShift, getTodayTimeEntries, clockIn, clockOut } from './js/db.js'
  import { toast, startClock } from './js/app.js'
  import { renderSidebar } from './js/sidebar.js'

  const user = requireAuth()
  if (!user) throw new Error()
  document.getElementById('sidebar').innerHTML = renderSidebar('timesheet')
  renderUserBadge('user-badge')
  startClock('live-clock')

  async function loadEmployees() {
    const { data } = await getEmployees()
    const sel = document.getElementById('emp-select')
    if (data) data.forEach(e=>{ const o=document.createElement('option'); o.value=e.id; o.textContent=e.name+' ('+e.role+')'; sel.appendChild(o) })
  }

  async function loadShift() {
    const { data } = await getCurrentShift()
    const el = document.getElementById('shift-list')
    if (!data||!data.length) { el.innerHTML='<div class="empty-state"><p>No one currently clocked in.</p></div>'; return }
    el.innerHTML = data.map(e=>`
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">
        <div>
          <div style="font-weight:600">${e.name}</div>
          <div style="font-size:11px;color:var(--text-2);text-transform:capitalize">${e.role}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:13px;font-weight:600;color:var(--store)">${e.hours_so_far ? parseFloat(e.hours_so_far).toFixed(1)+' hrs' : 'Just started'}</div>
          ${e.hours_so_far > 8 ? '<span class="badge badge-amber">OT</span>' : ''}
        </div>
      </div>
    `).join('')
  }

  async function loadEntries() {
    const { data } = await getTodayTimeEntries()
    const el = document.getElementById('entries-list')
    if (!data||!data.length) { el.innerHTML='<div class="empty-state"><p>No entries today.</p></div>'; return }
    el.innerHTML = `<div class="table-wrap"><table>
      <thead><tr><th>Employee</th><th>Role</th><th>Clock In</th><th>Clock Out</th><th>Hours</th><th>Status</th></tr></thead>
      <tbody>${data.map(e=>{
        const ci = new Date(e.clock_in)
        const co = e.clock_out ? new Date(e.clock_out) : null
        const hrs = co ? ((co-ci)/3600000).toFixed(2) : '—'
        return `<tr>
          <td style="font-weight:500">${e.employees?.name||'—'}</td>
          <td style="text-transform:capitalize;color:var(--text-2);font-size:12px">${e.employees?.role||'—'}</td>
          <td style="font-size:12px">${ci.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true})}</td>
          <td style="font-size:12px">${co?co.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true}):'<span style="color:var(--store)">Active</span>'}</td>
          <td style="font-weight:600">${hrs}</td>
          <td>${co?'<span class="badge badge-gray">Done</span>':'<span class="badge badge-store">On Shift</span>'}</td>
        </tr>`
      }).join('')}</tbody>
    </table></div>`
  }

  document.getElementById('clock-in-btn').addEventListener('click', async ()=>{
    const empId = document.getElementById('emp-select').value
    if (!empId) { toast('Select an employee first.','error'); return }
    const { error } = await clockIn(empId)
    if (error) toast('Error: '+(error.message.includes('duplicate')?'Already clocked in!':error.message),'error')
    else { toast('Clocked in!','success'); loadShift(); loadEntries() }
  })

  document.getElementById('clock-out-btn').addEventListener('click', async ()=>{
    const empId = document.getElementById('emp-select').value
    if (!empId) { toast('Select an employee first.','error'); return }
    // Find their open entry
    const { data } = await getTodayTimeEntries()
    const entry = data?.find(e=>e.employee_id===empId&&!e.clock_out)
    if (!entry) { toast('Employee is not clocked in.','error'); return }
    const { error } = await clockOut(entry.id)
    if (error) toast('Error: '+error.message,'error')
    else { toast('Clocked out!','success'); loadShift(); loadEntries() }
  })

  loadEmployees()
  loadShift()
  loadEntries()
  setInterval(()=>{ loadShift() }, 60000) // Refresh shift every minute
</script>
</body>
</html>
