<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employees — FuelManager</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-content">
    <div class="page-header">
      <div><div class="page-title">Employees</div><div class="page-subtitle">Manage staff, PINs, and roles</div></div>
      <div style="display:flex;gap:10px;align-items:center">
        <button class="btn btn-primary" id="add-btn">+ Add Employee</button>
        <div id="user-badge-header"></div>
      </div>
    </div>
    <div class="page-body">

      <!-- Add Employee Form -->
      <div class="card mb-6" id="add-form" style="display:none">
        <div class="card-title">Add New Employee</div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Full Name</label><input type="text" class="form-input" id="new-name" placeholder="Jane Smith"></div>
          <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" id="new-email" placeholder="jane@example.com"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Role</label>
            <select class="form-select" id="new-role">
              <option value="cashier">Cashier</option>
              <option value="supervisor">Supervisor</option>
              <option value="manager">Manager</option>
            </select>
          </div>
          <div class="form-group"><label class="form-label">4-Digit PIN</label><input type="text" class="form-input" id="new-pin" placeholder="e.g. 1234" maxlength="4" pattern="[0-9]{4}"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Hourly Rate ($)</label><input type="number" class="form-input" id="new-rate" placeholder="15.00" step="0.25" min="7.25"></div>
          <div class="form-group"><label class="form-label">Phone (optional)</label><input type="tel" class="form-input" id="new-phone" placeholder="262-555-1234"></div>
        </div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-primary" id="save-emp-btn">Save Employee</button>
          <button class="btn btn-secondary" id="cancel-btn">Cancel</button>
        </div>
      </div>

      <!-- Employee List -->
      <div class="card">
        <div class="card-title">All Active Staff</div>
        <div id="emp-list"><div class="loading-state"><div class="spinner"></div></div></div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { requireManager, renderUserBadge } from './js/auth.js'
  import { getEmployees, addEmployee } from './js/db.js'
  import { toast } from './js/app.js'
  import { renderSidebar } from './js/sidebar.js'

  const user = requireManager()
  if (!user) throw new Error()
  document.getElementById('sidebar').innerHTML = renderSidebar('employees')
  renderUserBadge('user-badge-header')

  const roleColor = { cashier:'gray', supervisor:'amber', manager:'gas' }

  async function load() {
    const { data, error } = await getEmployees()
    const el = document.getElementById('emp-list')
    if (error) { el.innerHTML='<div class="error-state"><p>Failed to load employees.</p></div>'; return }
    if (!data.length) { el.innerHTML='<div class="empty-state"><p>No employees yet. Add your first staff member!</p></div>'; return }
    el.innerHTML = `<div class="table-wrap"><table>
      <thead><tr><th>Name</th><th>Role</th><th>PIN</th><th>Hourly Rate</th><th>Email</th><th>Phone</th></tr></thead>
      <tbody>${data.map(e=>`<tr>
        <td style="font-weight:600">${e.name}</td>
        <td><span class="badge badge-${roleColor[e.role]||'gray'}" style="text-transform:capitalize">${e.role}</span></td>
        <td style="font-family:monospace;letter-spacing:0.1em;color:var(--text-2)">${e.pin||'—'}</td>
        <td style="font-weight:500">$${parseFloat(e.hourly_rate||0).toFixed(2)}/hr</td>
        <td style="font-size:12px;color:var(--text-2)">${e.email||'—'}</td>
        <td style="font-size:12px;color:var(--text-2)">${e.phone||'—'}</td>
      </tr>`).join('')}</tbody>
    </table></div>`
  }

  document.getElementById('add-btn').addEventListener('click',()=>{ document.getElementById('add-form').style.display='block'; document.getElementById('add-btn').style.display='none' })
  document.getElementById('cancel-btn').addEventListener('click',()=>{ document.getElementById('add-form').style.display='none'; document.getElementById('add-btn').style.display='' })

  document.getElementById('save-emp-btn').addEventListener('click', async ()=>{
    const name = document.getElementById('new-name').value.trim()
    const pin = document.getElementById('new-pin').value.trim()
    const rate = parseFloat(document.getElementById('new-rate').value)
    if (!name) { toast('Name is required.','error'); return }
    if (pin && !/^\d{4}$/.test(pin)) { toast('PIN must be exactly 4 digits.','error'); return }
    const btn = document.getElementById('save-emp-btn')
    btn.disabled=true; btn.textContent='Saving...'
    const { error } = await addEmployee({
      name,
      email: document.getElementById('new-email').value.trim()||null,
      role: document.getElementById('new-role').value,
      pin: pin||null,
      hourly_rate: isNaN(rate)?null:rate,
      phone: document.getElementById('new-phone').value.trim()||null,
      is_active: true
    })
    if (error) toast('Error: '+error.message,'error')
    else {
      toast('Employee added!','success')
      document.getElementById('add-form').style.display='none'
      document.getElementById('add-btn').style.display=''
      document.getElementById('new-name').value=''
      document.getElementById('new-email').value=''
      document.getElementById('new-pin').value=''
      document.getElementById('new-rate').value=''
      load()
    }
    btn.disabled=false; btn.textContent='Save Employee'
  })

  load()
</script>
</body>
</html>
