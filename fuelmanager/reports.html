<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports — FuelManager</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-content">
    <div class="page-header">
      <div><div class="page-title">Reports</div><div class="page-subtitle">Daily, weekly, and monthly summaries</div></div>
      <div id="user-badge-header"></div>
    </div>
    <div class="page-body">

      <!-- Date Range Lookup -->
      <div class="card mb-6">
        <div class="card-title">Custom Date Range</div>
        <div class="form-row" style="max-width:500px">
          <div class="form-group"><label class="form-label">From</label><input type="date" class="form-input" id="date-from"></div>
          <div class="form-group"><label class="form-label">To</label><input type="date" class="form-input" id="date-to"></div>
        </div>
        <button class="btn btn-primary" id="range-btn">Run Report</button>
        <div id="range-results" style="margin-top:16px"></div>
      </div>

      <!-- Daily Reports History -->
      <div class="card">
        <div class="card-title">Daily Report History</div>
        <div id="report-list"><div class="loading-state"><div class="spinner"></div></div></div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { requireAuth, renderUserBadge } from './js/auth.js'
  import { getRecentReports, getSalesByRange, fmt$, fmtDate } from './js/db.js'
  import { toast } from './js/app.js'
  import { renderSidebar } from './js/sidebar.js'

  const user = requireAuth()
  if (!user) throw new Error()
  document.getElementById('sidebar').innerHTML = renderSidebar('reports')
  renderUserBadge('user-badge-header')

  // Set default dates to this week
  const today = new Date()
  const weekAgo = new Date(); weekAgo.setDate(today.getDate()-7)
  document.getElementById('date-to').value = today.toISOString().split('T')[0]
  document.getElementById('date-from').value = weekAgo.toISOString().split('T')[0]

  async function loadReports() {
    const { data, error } = await getRecentReports(60)
    const el = document.getElementById('report-list')
    if (error) { el.innerHTML='<div class="error-state"><p>Could not load reports.</p></div>'; return }
    if (!data.length) { el.innerHTML='<div class="empty-state"><p>No daily reports yet. Reports are generated automatically each night.</p></div>'; return }
    el.innerHTML = `<div class="table-wrap"><table>
      <thead><tr><th>Date</th><th>Gas Revenue</th><th>Lottery Revenue</th><th>Store Revenue</th><th>Total Revenue</th><th>Transactions</th></tr></thead>
      <tbody>${data.map(r=>`<tr>
        <td style="font-weight:600">${fmtDate(r.report_date)}</td>
        <td style="color:var(--gas)">${fmt$(r.gas_total)}</td>
        <td style="color:var(--lottery)">${fmt$(r.lottery_total)}</td>
        <td style="color:var(--store)">${fmt$(r.store_total)}</td>
        <td style="font-weight:700">${fmt$(r.grand_total)}</td>
        <td style="color:var(--text-2)">${r.total_transactions||0}</td>
      </tr>`).join('')}</tbody>
    </table></div>`
  }

  document.getElementById('range-btn').addEventListener('click', async ()=>{
    const from = document.getElementById('date-from').value
    const to = document.getElementById('date-to').value
    if (!from||!to) { toast('Select a date range.','error'); return }
    const btn = document.getElementById('range-btn')
    btn.disabled=true; btn.textContent='Loading...'
    const [gas, lottery, store] = await Promise.all([
      getSalesByRange('gas_sales', from, to),
      getSalesByRange('lottery_sales', from, to),
      getSalesByRange('store_sales', from, to)
    ])
    const gasTotal = (gas.data||[]).reduce((s,r)=>s+parseFloat(r.total_amount||0),0)
    const lotTotal = (lottery.data||[]).reduce((s,r)=>s+parseFloat(r.total_amount||0),0)
    const storeTotal = (store.data||[]).reduce((s,r)=>s+parseFloat(r.total_amount||0),0)
    const grandTotal = gasTotal + lotTotal + storeTotal
    const txns = (gas.data?.length||0) + (lottery.data?.length||0) + (store.data?.length||0)
    document.getElementById('range-results').innerHTML = `
      <div class="stat-grid">
        <div class="stat-card gas"><div class="stat-label">Gas</div><div class="stat-value">${fmt$(gasTotal)}</div><div class="stat-sub">${gas.data?.length||0} transactions</div></div>
        <div class="stat-card lottery"><div class="stat-label">Lottery</div><div class="stat-value">${fmt$(lotTotal)}</div><div class="stat-sub">${lottery.data?.length||0} transactions</div></div>
        <div class="stat-card store"><div class="stat-label">Store</div><div class="stat-value">${fmt$(storeTotal)}</div><div class="stat-sub">${store.data?.length||0} transactions</div></div>
        <div class="stat-card total"><div class="stat-label">Total</div><div class="stat-value">${fmt$(grandTotal)}</div><div class="stat-sub">${txns} total</div></div>
      </div>`
    btn.disabled=false; btn.textContent='Run Report'
  })

  loadReports()
</script>
</body>
</html>
