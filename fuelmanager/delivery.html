<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deliveries — FuelManager</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main-content">
    <div class="page-header">
      <div><div class="page-title">Deliveries</div><div class="page-subtitle">Log vendor deliveries and update inventory</div></div>
      <div style="display:flex;gap:10px;align-items:center">
        <button class="btn btn-primary" id="new-btn">+ Log Delivery</button>
        <div id="user-badge-header"></div>
      </div>
    </div>
    <div class="page-body">

      <!-- New Delivery Form -->
      <div class="card mb-6" id="delivery-form" style="display:none">
        <div class="card-title">New Delivery</div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Vendor Name</label><input type="text" class="form-input" id="d-vendor" placeholder="e.g. McLane, Core-Mark, Pepsi"></div>
          <div class="form-group"><label class="form-label">Invoice Number</label><input type="text" class="form-input" id="d-invoice" placeholder="e.g. INV-2026-001"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Delivery Date</label><input type="date" class="form-input" id="d-date"></div>
          <div class="form-group"><label class="form-label">Total Invoice Amount ($)</label><input type="number" class="form-input" id="d-total" placeholder="0.00" step="0.01"></div>
        </div>
        <div class="form-group"><label class="form-label">Notes</label><input type="text" class="form-input" id="d-notes" placeholder="Any delivery notes..."></div>

        <div style="border-top:1px solid var(--border);margin:16px 0;padding-top:16px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <div class="card-title" style="margin:0">Items Delivered</div>
            <button class="btn btn-sm btn-secondary" id="add-item-btn">+ Add Item</button>
          </div>
          <div id="item-rows"></div>
        </div>

        <div style="display:flex;gap:10px">
          <button class="btn btn-primary" id="save-delivery-btn">Save Delivery</button>
          <button class="btn btn-secondary" id="cancel-delivery-btn">Cancel</button>
        </div>
      </div>

      <!-- Delivery History -->
      <div class="card">
        <div class="card-title">Recent Deliveries</div>
        <div id="delivery-list"><div class="loading-state"><div class="spinner"></div></div></div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { requireAuth, renderUserBadge } from './js/auth.js'
  import { getDeliveries, saveDelivery, saveDeliveryItems } from './js/db.js'
  import { toast } from './js/app.js'
  import { renderSidebar } from './js/sidebar.js'

  const user = requireAuth()
  if (!user) throw new Error()
  document.getElementById('sidebar').innerHTML = renderSidebar('delivery')
  renderUserBadge('user-badge-header')
  document.getElementById('d-date').value = new Date().toISOString().split('T')[0]

  let itemCount = 0

  function addItemRow() {
    itemCount++
    const id = 'item-'+itemCount
    const row = document.createElement('div')
    row.id = id
    row.style.cssText = 'display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:8px;margin-bottom:8px;align-items:end'
    row.innerHTML = `
      <div><label class="form-label">Item Name</label><input type="text" class="form-input item-name" placeholder="Monster Energy 16oz"></div>
      <div><label class="form-label">Qty</label><input type="number" class="form-input item-qty" placeholder="24" min="0"></div>
      <div><label class="form-label">Unit Cost</label><input type="number" class="form-input item-cost" placeholder="1.50" step="0.01"></div>
      <button class="btn btn-sm btn-outline" style="color:var(--red)" onclick="document.getElementById('${id}').remove()">✕</button>
    `
    document.getElementById('item-rows').appendChild(row)
    window.itemCount = itemCount
  }
  window.addItemRow = addItemRow

  document.getElementById('add-item-btn').addEventListener('click', addItemRow)
  addItemRow() // Start with one row

  document.getElementById('new-btn').addEventListener('click',()=>{ document.getElementById('delivery-form').style.display='block'; document.getElementById('new-btn').style.display='none' })
  document.getElementById('cancel-delivery-btn').addEventListener('click',()=>{ document.getElementById('delivery-form').style.display='none'; document.getElementById('new-btn').style.display='' })

  document.getElementById('save-delivery-btn').addEventListener('click', async ()=>{
    const vendor = document.getElementById('d-vendor').value.trim()
    const date = document.getElementById('d-date').value
    if (!vendor||!date) { toast('Enter vendor and date.','error'); return }
    const btn = document.getElementById('save-delivery-btn')
    btn.disabled=true; btn.textContent='Saving...'
    const { data: delivery, error } = await saveDelivery({
      vendor_name: vendor,
      invoice_number: document.getElementById('d-invoice').value.trim()||null,
      delivery_date: date,
      total_amount: parseFloat(document.getElementById('d-total').value)||0,
      notes: document.getElementById('d-notes').value.trim()||null,
      received_by: user.id
    })
    if (error) { toast('Error: '+error.message,'error'); btn.disabled=false; btn.textContent='Save Delivery'; return }
    // Save items
    const items = []
    document.querySelectorAll('#item-rows > div').forEach(row=>{
      const name = row.querySelector('.item-name')?.value.trim()
      const qty = parseInt(row.querySelector('.item-qty')?.value)||0
      const cost = parseFloat(row.querySelector('.item-cost')?.value)||0
      if (name) items.push({ delivery_id: delivery.id, item_name: name, quantity: qty, unit_cost: cost })
    })
    if (items.length) await saveDeliveryItems(items)
    toast('Delivery saved!','success')
    document.getElementById('delivery-form').style.display='none'
    document.getElementById('new-btn').style.display=''
    document.getElementById('item-rows').innerHTML=''
    addItemRow()
    btn.disabled=false; btn.textContent='Save Delivery'
    load()
  })

  async function load() {
    const { data, error } = await getDeliveries()
    const el = document.getElementById('delivery-list')
    if (error) { el.innerHTML='<div class="error-state"><p>Could not load deliveries.</p></div>'; return }
    if (!data||!data.length) { el.innerHTML='<div class="empty-state"><p>No deliveries logged yet.</p></div>'; return }
    el.innerHTML = data.map(d=>`
      <div style="border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div>
            <div style="font-weight:600;font-size:14px">${d.vendor_name}</div>
            <div style="font-size:11px;color:var(--text-2)">${d.delivery_date} ${d.invoice_number?'· Invoice: '+d.invoice_number:''}</div>
          </div>
          <div style="font-size:18px;font-weight:700;color:var(--gas)">$${parseFloat(d.total_amount||0).toFixed(2)}</div>
        </div>
        ${d.delivery_items?.length ? `<div style="font-size:12px;color:var(--text-2)">${d.delivery_items.map(i=>`${i.item_name} × ${i.quantity}`).join(' · ')}</div>` : ''}
        ${d.notes?`<div style="font-size:11px;color:var(--text-3);margin-top:4px">${d.notes}</div>`:''}
      </div>
    `).join('')
  }

  load()
</script>
</body>
</html>
